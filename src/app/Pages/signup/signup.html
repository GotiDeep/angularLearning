<div class="main-container">
  <div class="form-container">
    <div class="container">
      <form class="form" #loginForm="ngForm" (ngSubmit)="signup()">

        <p class="title">Create account</p>
        <p class="form-subtitle">Fill in the details below to get started</p>

        <div class="input-group">
          <label class="input-label">Username</label>
          <input placeholder="Choose a username" name="username" class="input" type="text" [(ngModel)]="users.username" required />
        </div>

        <div class="input-group">
          <label class="input-label">Email address</label>
          <input placeholder="you@example.com" name="email" class="input" type="email" [(ngModel)]="users.email" required />
        </div>

        <div class="input-group">
          <label class="input-label">Mobile number</label>
          <input placeholder="10-digit mobile number" name="mobile" class="input" type="number" [(ngModel)]="users.mobile" required />
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>
          <input placeholder="Create a strong password" name="password" class="input" type="password" [(ngModel)]="users.password" required />
        </div>

        <div class="input-group">
          <label class="input-label">Confirm password</label>
          <input placeholder="Re-enter your password" name="confpass" class="input" type="password" [(ngModel)]="users.confpass" required />
        </div>

        <button class="btn" name="submit" type="submit" [disabled]="loginForm.invalid">Create Account</button>

        <p class="form-link">
          Already have an account? <a routerLink="/login">Sign in</a>
        </p>

      </form>
    </div>
  </div>
</div>
