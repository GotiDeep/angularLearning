<div class="main-container">
  <div class="form-container">
    <div class="container">
      <form class="form" [formGroup]="ForgetForm" (ngSubmit)="sendLink()">

        <p class="title">Forget Password</p>
        <p class="form-subtitle">Enter your email address to receive a reset link.</p>

        <div class="input-group">
          <label class="input-label">Email address</label>
          <input
            placeholder="you@example.com"
            name="email"
            class="input"
            type="email"
            formControlName="email"
            required
          />
        </div>

        <button class="btn" type="submit" name="submit">Verify An Email</button>

        <p class="form-link">
          Don't have an account? <a routerLink="/signup">Create one</a>
        </p>

      </form>
    </div>
  </div>
</div>
